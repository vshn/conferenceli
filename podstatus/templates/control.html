<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0d1117">
    <title>Podstatus Control</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: #0d1117;
            color: #e6edf3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            padding-top: max(1.5rem, env(safe-area-inset-top));
            padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 14px;
            padding: 1.5rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 {
            margin: 0 0 1.25rem;
            font-size: 1.4rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.02em;
        }
        input[type="password"],
        input[type="number"] {
            width: 100%;
            padding: 0.9rem 1rem;
            font-size: 1rem;
            border: 1px solid #30363d;
            border-radius: 8px;
            background: #0d1117;
            color: #e6edf3;
            margin-bottom: 0.75rem;
            -webkit-appearance: none;
            appearance: none;
        }
        input[type="password"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #1f6feb;
            box-shadow: 0 0 0 3px rgba(31,111,235,0.3);
        }
        .kc-form {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.5rem;
            align-items: stretch;
        }
        .kc-form input[type="number"] {
            margin-bottom: 0;
        }
        .kc-form button {
            margin-bottom: 0;
            width: auto;
            padding: 0 1.1rem;
            white-space: nowrap;
        }
        button {
            width: 100%;
            padding: 1rem;
            font-size: 1.05rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 0.75rem;
            color: white;
            transition: background 0.15s ease, transform 0.05s ease;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary { background: #238636; }
        .btn-primary:hover { background: #2ea043; }
        .btn-chaos { background: #da3633; }
        .btn-chaos:hover { background: #f85149; }
        .btn-night { background: #1f6feb; }
        .btn-night:hover { background: #388bfd; }
        .btn-logout {
            background: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
            font-weight: 500;
            margin-top: 0.5rem;
            margin-bottom: 0;
        }
        .btn-logout:hover { background: #21262d; }
        .section-label {
            margin: 1.25rem 0 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .section-label:first-of-type { margin-top: 0.5rem; }
        .theatre-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }
        .theatre-grid button {
            margin-bottom: 0;
            padding: 0.7rem 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            background: #30363d;
            color: #e6edf3;
            border: 1px solid #444c56;
        }
        .theatre-grid button:hover { background: #3a414b; }
        .theatre-grid button.has-kill {
            border-color: #6e2a28;
            background: #3a1f1e;
        }
        .theatre-grid button.has-kill:hover { background: #4d2825; }
        .error {
            background: rgba(248,81,73,0.1);
            border: 1px solid rgba(248,81,73,0.4);
            color: #ff7b72;
            padding: 0.6rem 0.75rem;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }
        .status {
            text-align: center;
            margin-top: 0.5rem;
            min-height: 1.25rem;
            font-size: 0.9rem;
            color: #8b949e;
            word-break: break-word;
        }
        .status.ok { color: #3fb950; }
        .status.err { color: #ff7b72; }
    </style>
</head>
<body>
    <div class="card">
        <h1>VSHN Control</h1>
        {% if not authed %}
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
            <form method="post" action="{{ url_for('control') }}" autocomplete="off">
                <input type="password" name="password" placeholder="Password" autofocus required>
                <button type="submit" class="btn-primary">Unlock</button>
            </form>
        {% else %}
            <button class="btn-chaos" onclick="trigger('chaos', this)">Trigger Chaos</button>
            <button class="btn-night" onclick="trigger('nightmode', this)">Toggle Night Mode</button>

            <div class="section-label">Pods destroyed counter</div>
            <form class="kc-form" onsubmit="event.preventDefault(); setKillCount(this.querySelector('button'));">
                <input type="number" id="kc-input" min="0" step="1" value="0" inputmode="numeric">
                <button type="submit" class="btn-primary">Set</button>
            </form>

            <div class="section-label">Theatre — Signature</div>
            <div class="theatre-grid">
                <button class="has-kill" onclick="fireEvent('lightning-strike', this)">⚡ Lightning</button>
                <button class="has-kill" onclick="fireEvent('rogue-wave', this)">🌊 Rogue wave</button>
                <button class="has-kill" onclick="fireEvent('crane-mishap', this)">🏗️ Crane mishap</button>
                <button class="has-kill" onclick="fireEvent('cargo-fire', this)">🔥 Cargo fire</button>
                <button class="has-kill" onclick="fireEvent('pirate-broadside', this)">🏴‍☠️ Pirates</button>
            </div>

            <div class="section-label">Theatre — Cameos</div>
            <div class="theatre-grid">
                <button class="has-kill" onclick="fireEvent('kraken', this)">🦑 Kraken</button>
                <button class="has-kill" onclick="fireEvent('ufo-abduction', this)">🛸 UFO</button>
                <button onclick="fireEvent('jaws-fin', this)">🦈 Jaws fin</button>
                <button onclick="fireEvent('nessie', this)">🦕 Nessie</button>
                <button onclick="fireEvent('meteor', this)">☄️ Meteor</button>
                <button onclick="fireEvent('godzilla', this)">🦖 Godzilla</button>
                <button onclick="fireEvent('rubber-duck', this)">🦆 Rubber duck</button>
            </div>

            <div class="section-label">Theatre — Ambient</div>
            <div class="theatre-grid">
                <button onclick="fireEvent('tugboat', this)">⛵ Tugboat</button>
                <button onclick="fireEvent('helicopter', this)">🚁 Helicopter</button>
                <button onclick="fireEvent('lighthouse-pulse', this)">💡 Beam pulse</button>
                <button onclick="fireEvent('fog-drift', this)">🌫️ Fog</button>
                <button onclick="fireEvent('distant-lightning', this)">⛈️ Far lightning</button>
                <button onclick="fireEvent('periscope', this)">🔭 Periscope</button>
                <button onclick="fireEvent('whale-spout', this)">🐳 Whale</button>
                <button onclick="fireEvent('seagull-frenzy', this)">🐦 Seagulls</button>
                <button onclick="fireEvent('crane-swing', this)">🏗 Crane</button>
                <button onclick="fireEvent('cloud-shadow', this)">☁️ Cloud shadow</button>
            </div>

            <div class="status" id="status"></div>
            <form method="post" action="{{ url_for('control_logout') }}">
                <button type="submit" class="btn-logout">Lock</button>
            </form>
        {% endif %}
    </div>
    <script>
        async function trigger(action, btn) {
            const status = document.getElementById('status');
            const buttons = document.querySelectorAll('.btn-chaos, .btn-night');
            buttons.forEach(b => b.disabled = true);
            status.className = 'status';
            status.textContent = 'Working...';
            try {
                const res = await fetch('/control/' + action, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json' }
                });
                if (res.status === 401) {
                    window.location.reload();
                    return;
                }
                const data = await res.json();
                const msg = data.message || (data.mode ? 'Mode: ' + data.mode : 'Done');
                status.className = 'status ' + (res.ok ? 'ok' : 'err');
                status.textContent = msg;
            } catch (e) {
                status.className = 'status err';
                status.textContent = 'Error: ' + e.message;
            } finally {
                buttons.forEach(b => b.disabled = false);
            }
        }

        async function setKillCount(btn) {
            const status = document.getElementById('status');
            const input = document.getElementById('kc-input');
            const value = parseInt(input.value, 10);
            if (!Number.isFinite(value) || value < 0) {
                status.className = 'status err';
                status.textContent = 'Enter a non-negative number';
                return;
            }
            btn.disabled = true;
            status.className = 'status';
            status.textContent = 'Setting...';
            try {
                const res = await fetch('/control/kill-count', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ value }),
                });
                if (res.status === 401) { window.location.reload(); return; }
                const data = await res.json();
                status.className = 'status ' + (res.ok ? 'ok' : 'err');
                status.textContent = data.message || 'Done';
            } catch (e) {
                status.className = 'status err';
                status.textContent = 'Error: ' + e.message;
            } finally {
                btn.disabled = false;
            }
        }

        async function fireEvent(name, btn) {
            const status = document.getElementById('status');
            // Brief disable on the clicked button only — theatre events overlap
            // freely from the operator's perspective, the kiosk handles ordering.
            btn.disabled = true;
            status.className = 'status';
            status.textContent = '🎬 ' + name + '...';
            try {
                const res = await fetch('/control/event/' + encodeURIComponent(name), {
                    method: 'POST',
                    headers: { 'Accept': 'application/json' }
                });
                if (res.status === 401) {
                    window.location.reload();
                    return;
                }
                const data = await res.json();
                status.className = 'status ' + (res.ok ? 'ok' : 'err');
                status.textContent = data.message || 'Done';
            } catch (e) {
                status.className = 'status err';
                status.textContent = 'Error: ' + e.message;
            } finally {
                setTimeout(() => { btn.disabled = false; }, 1500);
            }
        }
    </script>
</body>
</html>
